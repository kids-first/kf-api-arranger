schema {
  query: Root
  mutation: Mutation
}

type Aggregations {
  bucket_count: Int
  buckets(max: Int): [Bucket]
  cardinality(precision_threshold: Int): Int
}

type AggsState {
  timestamp: String
  state: [AggState]
}

"""########## QUERY TYPES ###########"""
type AggState {
  field: String
  type: String @deprecated(reason: "This field is deprecated in favour of client-side deduction of the type using the es mapping and @arranger/mapping-utils/esToAggTypeMap. This computation will already be done with @Arranger/components. Projects created with 0.4.6 will return null for this query")
  active: Boolean
  show: Boolean
}

"""########## INPUT TYPES ###########"""
input AggStateInput {
  field: String
  active: Boolean
  show: Boolean
}

type biospecimen {
  mapping: JSON
  extended(fields: [String]): JSON
  aggsState: AggsState
  columnsState: ColumnsState
  matchBoxState: MatchBoxState
  hits(score: String, offset: Int, sort: [Sort], filters: JSON, before: String, after: String, first: Int, last: Int, searchAfter: JSON, trackTotalHits: Boolean = true): biospecimenConnection
  aggregations(
    filters: JSON
    include_missing: Boolean

    """
    Should term aggregations be affected by queries that contain filters on
    their field. For example if a query is filtering primary_site by Blood
    should the term aggregation on primary_site return all values or just Blood.
    Set to False for UIs that allow users to select multiple values of an aggregation.
    """
    aggregations_filter_themselves: Boolean
  ): biospecimenAggregations
}

type biospecimen_trees {
  mapping: JSON
  extended(fields: [String]): JSON
  aggsState: AggsState
  columnsState: ColumnsState
  matchBoxState: MatchBoxState
  hits(score: String, offset: Int, sort: [Sort], filters: JSON, before: String, after: String, first: Int, last: Int, searchAfter: JSON, trackTotalHits: Boolean = true): biospecimen_treesConnection
  aggregations(
    filters: JSON
    include_missing: Boolean

    """
    Should term aggregations be affected by queries that contain filters on
    their field. For example if a query is filtering primary_site by Blood
    should the term aggregation on primary_site return all values or just Blood.
    Set to False for UIs that allow users to select multiple values of an aggregation.
    """
    aggregations_filter_themselves: Boolean
  ): biospecimen_treesAggregations
}

type biospecimen_treesAggregations {
  collection_fhir_id: Aggregations
  fhir_id: Aggregations
  sample_id: Aggregations
  study_id: Aggregations
  tree_str: Aggregations
}

type biospecimen_treesConnection {
  total: Int!
  edges: [biospecimen_treesEdge]
}

type biospecimen_treesEdge {
  searchAfter: JSON
  node: biospecimen_treesNode
}

type biospecimen_treesNode implements Node {
  id: ID!
  score: Int
  collection_fhir_id: String
  fhir_id: String
  sample_id: String
  study_id: String
  tree_str: String
}

