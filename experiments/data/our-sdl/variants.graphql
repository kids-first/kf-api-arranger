interface Node {
  id: ID!
}

type Query {
  node: variantsNode
}

type variantsClinvar {
  _placeholder: String
}

type variantsExternal_frequencies {
  _placeholder: String
}

type variantsGenes {
  _placeholder: String
}

type variantsInternal_frequencies {
  _placeholder: String
}

type variantsNode implements Node {
  id: ID!
  score: Int
  alternate: String
  assembly_version: String
  chromosome: String
  dna_change: String
  end: Float
  gene_external_reference: [String]
  hash: String
  hgvsg: String
  locus: String
  max_impact_score: Float
  reference: String
  rsnumber: String
  start: Float
  variant_class: String
  variant_external_reference: String
  clinvar: variantsClinvar
  external_frequencies: variantsExternal_frequencies
  genes: variantsGenes
  internal_frequencies: variantsInternal_frequencies
  studies: variantsStudies
}

type variantsStudies {
  _placeholder: String
}
