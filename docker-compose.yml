services:
  app:
    image: node:24-alpine3.22
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c 'npm install && npm run dev'
    ports:
      - "5050:5050"

  test:
    image: node:24-alpine3.22
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c 'npm install && npm run test'
